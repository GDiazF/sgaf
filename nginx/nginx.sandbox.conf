upstream sandbox_backend_server {
    server sandbox_backend:8000;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 20M;

    # Frontend Assets & React Router
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api/ {
        proxy_pass http://sandbox_backend_server;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Django Admin
    location /admin/ {
        proxy_pass http://sandbox_backend_server;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    # Static Files
    location /static/ {
        alias /app/staticfiles/;
    }

    # Media Files
    location /media/ {
        alias /app/media/;
    }
}

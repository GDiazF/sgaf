version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sgaf_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sgaf}
      POSTGRES_USER: ${DB_USER:-sgaf_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./docker/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sgaf_user} -d ${DB_NAME:-sgaf}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: sgaf_backend_prod
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: sgaf_frontend_prod
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./media:/app/media:ro
      - ./staticfiles:/app/staticfiles:ro
    depends_on:
      - backend

volumes:
  postgres_data:

version: '3.8'

services:

  db:
    image: postgres:16-alpine
    container_name: sgaf_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /home/slepiquique/sgaf_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sgaf_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - /home/slepiquique/sgaf/media:/app/media
      - /home/slepiquique/sgaf/staticfiles:/app/staticfiles
      - frontend_assets:/app/frontend/dist
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: sgaf_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/slepiquique/sgaf/staticfiles:/app/staticfiles:ro
      - /home/slepiquique/sgaf/media:/app/media:ro
      - frontend_assets:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  frontend_assets:
